name: Deploy to Railway

on:
  push:
    branches: [ main ]
    paths: 
      - 'infra/directus/**'
      - 'scripts/**'
      - 'railway.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Use Railway CLI to deploy
      uses: railway-app/railway-action@v1
      with:
        command: 'up'
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
